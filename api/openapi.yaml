components:
  schemas:
    AuthLoginRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/AuthLoginRequest.json
          format: uri
          readOnly: true
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password
      type: object
    AuthRefreshRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/AuthRefreshRequest.json
          format: uri
          readOnly: true
          type: string
        refreshToken:
          type: string
      required:
        - refreshToken
      type: object
    AuthTokens:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/AuthTokens.json
          format: uri
          readOnly: true
          type: string
        accessToken:
          type: string
        accessTokenExpiresAt:
          format: date-time
          type: string
        refreshToken:
          type: string
      required:
        - accessToken
        - refreshToken
        - accessTokenExpiresAt
      type: object
    Board:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/Board.json
          format: uri
          readOnly: true
          type: string
        boardVersion:
          format: int64
          minimum: 1
          type: integer
        createdAt:
          format: date-time
          type: string
        id:
          format: uuid
          type: string
        ownerUserId:
          type: string
        title:
          maxLength: 120
          minLength: 1
          type: string
        updatedAt:
          format: date-time
          type: string
      required:
        - id
        - ownerUserId
        - title
        - boardVersion
        - createdAt
        - updatedAt
      type: object
    BoardDetailsResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/BoardDetailsResponse.json
          format: uri
          readOnly: true
          type: string
        board:
          $ref: "#/components/schemas/Board"
        columns:
          items:
            $ref: "#/components/schemas/Column"
          nullable: true
          type: array
        tasks:
          items:
            $ref: "#/components/schemas/Task"
          nullable: true
          type: array
      required:
        - board
        - columns
        - tasks
      type: object
    Column:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/Column.json
          format: uri
          readOnly: true
          type: string
        boardId:
          format: uuid
          type: string
        createdAt:
          format: date-time
          type: string
        id:
          format: uuid
          type: string
        position:
          format: int64
          minimum: 0
          type: integer
        title:
          maxLength: 120
          minLength: 1
          type: string
        updatedAt:
          format: date-time
          type: string
      required:
        - id
        - boardId
        - title
        - position
        - createdAt
        - updatedAt
      type: object
    CreateBoardRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/CreateBoardRequest.json
          format: uri
          readOnly: true
          type: string
        title:
          maxLength: 120
          minLength: 1
          type: string
      required:
        - title
      type: object
    CreateColumnRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/CreateColumnRequest.json
          format: uri
          readOnly: true
          type: string
        title:
          maxLength: 120
          minLength: 1
          type: string
      required:
        - title
      type: object
    CreateTaskRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/CreateTaskRequest.json
          format: uri
          readOnly: true
          type: string
        columnId:
          format: uuid
          type: string
        description:
          maxLength: 4000
          type: string
        title:
          maxLength: 200
          minLength: 1
          type: string
      required:
        - columnId
        - title
        - description
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    MeResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/MeResponse.json
          format: uri
          readOnly: true
          type: string
        email:
          type: string
        userId:
          type: string
      required:
        - userId
        - email
      type: object
    ReorderColumnsRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/ReorderColumnsRequest.json
          format: uri
          readOnly: true
          type: string
        columnIds:
          items:
            type: string
          minItems: 1
          type: array
      required:
        - columnIds
      type: object
    ReorderTasksRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/ReorderTasksRequest.json
          format: uri
          readOnly: true
          type: string
        columns:
          items:
            $ref: "#/components/schemas/TaskColumnOrderRequest"
          minItems: 1
          type: array
      required:
        - columns
      type: object
    Task:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/Task.json
          format: uri
          readOnly: true
          type: string
        boardId:
          format: uuid
          type: string
        columnId:
          format: uuid
          type: string
        createdAt:
          format: date-time
          type: string
        description:
          maxLength: 4000
          type: string
        id:
          format: uuid
          type: string
        position:
          format: int64
          minimum: 0
          type: integer
        title:
          maxLength: 200
          minLength: 1
          type: string
        updatedAt:
          format: date-time
          type: string
      required:
        - id
        - boardId
        - columnId
        - title
        - description
        - position
        - createdAt
        - updatedAt
      type: object
    TaskColumnOrderRequest:
      additionalProperties: false
      properties:
        columnId:
          format: uuid
          type: string
        taskIds:
          items:
            type: string
          type: array
      required:
        - columnId
        - taskIds
      type: object
    TaskExportColumn:
      additionalProperties: false
      properties:
        tasks:
          items:
            $ref: "#/components/schemas/TaskExportTask"
          type: array
        title:
          maxLength: 120
          minLength: 1
          type: string
      required:
        - title
        - tasks
      type: object
    TaskExportPayload:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/TaskExportPayload.json
          format: uri
          readOnly: true
          type: string
        boardTitle:
          maxLength: 120
          minLength: 1
          type: string
        columns:
          items:
            $ref: "#/components/schemas/TaskExportColumn"
          type: array
        exportedAt:
          format: date-time
          type: string
        formatVersion:
          format: int64
          minimum: 1
          type: integer
      required:
        - formatVersion
        - boardTitle
        - exportedAt
        - columns
      type: object
    TaskExportTask:
      additionalProperties: false
      properties:
        description:
          maxLength: 4000
          type: string
        title:
          maxLength: 200
          minLength: 1
          type: string
      required:
        - title
        - description
      type: object
    TaskImportResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/TaskImportResponse.json
          format: uri
          readOnly: true
          type: string
        createdColumnCount:
          format: int64
          minimum: 0
          type: integer
        importedTaskCount:
          format: int64
          minimum: 0
          type: integer
      required:
        - createdColumnCount
        - importedTaskCount
      type: object
    UpdateBoardRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/UpdateBoardRequest.json
          format: uri
          readOnly: true
          type: string
        title:
          maxLength: 120
          minLength: 1
          type: string
      required:
        - title
      type: object
    UpdateColumnRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/UpdateColumnRequest.json
          format: uri
          readOnly: true
          type: string
        title:
          maxLength: 120
          minLength: 1
          type: string
      required:
        - title
      type: object
    UpdateTaskRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/UpdateTaskRequest.json
          format: uri
          readOnly: true
          type: string
        description:
          maxLength: 4000
          type: string
        title:
          maxLength: 200
          minLength: 1
          type: string
      required:
        - title
        - description
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  title: Go MacOS Task API
  version: 0.1.0
openapi: 3.0.3
paths:
  /auth/login:
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Authenticates a user and returns tokens
  /auth/logout:
    post:
      operationId: logout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRefreshRequest"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Revokes session and logs out user
  /auth/refresh:
    post:
      operationId: refreshAuth
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRefreshRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Refreshes an access token using refresh token
  /boards:
    get:
      operationId: listBoards
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Board"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: List boards for the authenticated user
    post:
      operationId: createBoard
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBoardRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create a board
  /boards/{boardId}:
    delete:
      operationId: deleteBoard
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
        - in: path
          name: boardId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Delete a board
    get:
      operationId: getBoard
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
        - in: path
          name: boardId
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardDetailsResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Get board with columns and tasks
    patch:
      operationId: updateBoard
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
        - in: path
          name: boardId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBoardRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Update board title
  /boards/{boardId}/columns:
    post:
      operationId: createColumn
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
        - in: path
          name: boardId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateColumnRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Column"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create a column
  /boards/{boardId}/columns/order:
    put:
      operationId: reorderColumns
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
        - in: path
          name: boardId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderColumnsRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Column"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Replace board column order
  /boards/{boardId}/columns/{columnId}:
    delete:
      operationId: deleteColumn
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
        - in: path
          name: boardId
          required: true
          schema:
            type: string
        - in: path
          name: columnId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Delete a column
    patch:
      operationId: updateColumn
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
        - in: path
          name: boardId
          required: true
          schema:
            type: string
        - in: path
          name: columnId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateColumnRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Column"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Update column title
  /boards/{boardId}/tasks:
    post:
      operationId: createTask
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
        - in: path
          name: boardId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Create a task
  /boards/{boardId}/tasks/export:
    get:
      operationId: exportTasks
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
        - in: path
          name: boardId
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskExportPayload"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Export board tasks as versioned payload
  /boards/{boardId}/tasks/import:
    post:
      operationId: importTasks
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
        - in: path
          name: boardId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskExportPayload"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskImportResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Import board tasks from versioned payload
  /boards/{boardId}/tasks/order:
    put:
      operationId: reorderTasks
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
        - in: path
          name: boardId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderTasksRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Task"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Replace board task order
  /boards/{boardId}/tasks/{taskId}:
    delete:
      operationId: deleteTask
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
        - in: path
          name: boardId
          required: true
          schema:
            type: string
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Delete a task
    patch:
      operationId: updateTask
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
        - in: path
          name: boardId
          required: true
          schema:
            type: string
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Update a task
  /hello:
    get:
      operationId: getHello
      responses:
        "200":
          content:
            text/plain:
              schema:
                type: string
          description: Plain text hello message
          headers:
            Content-Type:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Returns hello world text
  /me:
    get:
      operationId: getMe
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - bearerAuth: []
      summary: Returns the authenticated user identity
